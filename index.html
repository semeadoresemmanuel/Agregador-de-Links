<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kit de Ferramentas Semeadores</title>
    <!-- Meta Descriptions for SEO -->
    <meta name="description" content="Agregador de links oficial da comunidade Semeadores. Acesso rápido às ferramentas.">
    
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="index.css">

    <!-- Web App Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002400">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
    <div class="aggregator-wrapper">
        <main class="aggregator-card">
            <header class="profile-header">
                <div class="logo-wrapper">
                    <img src="assets/logo.svg" alt="Logo" class="profile-logo">
                </div>
            </header>

            <section class="links-stack" aria-label="Links Úteis">
                <!-- Link 1: Caixa de Sugestões -->
                <a href="https://caixadesugestoessemeadores.vercel.app" class="link-button" aria-label="Abrir Caixa de Sugestões">
                    <img src="assets/caixadesugestoes.svg" alt="Caixa de Sugestões" class="btn-svg-icon">
                </a>

                <!-- Link 2: Cronograma -->
                <a href="https://cronogramasemeadores.vercel.app" class="link-button" aria-label="Abrir Cronograma">
                    <img src="assets/cronograma.svg" alt="Cronograma" class="btn-svg-icon">
                </a>

                <!-- Link 3: Hinário -->
                <a href="https://hinariodigitalsemeadores.vercel.app" class="link-button" aria-label="Abrir Hinário">
                    <img src="assets/hinario.svg" alt="Hinário" class="btn-svg-icon">
                </a>
            </section>
        </main>

        <footer class="profile-footer">
            <div class="copyright-wrapper">
                <img src="assets/copyright.svg" alt="Copyright" class="copyright-icon">
            </div>
        </footer>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
